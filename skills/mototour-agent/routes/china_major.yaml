      9: ["雨季尾声", "最佳窗口之一"]
      10: ["最佳窗口", "秋景", "早晚偏冷"]
      11: ["开始降雪", "部分路段可能积雪"]
      12: ["严寒", "路面冰雪", "不推荐"]

