    end: "拉萨"
    total_km: 2140
    overall_difficulty: "intermediate"
    note: "中国最成熟的进藏摩旅路线，基础设施完善"
    segments:
      - name: "成都-康定"
        km: 330
        surface: "paved"
        altitude_range: [500, 2800]
        difficulty: "easy"
        note: "全程铺装高速/国道，第一天热身路段"
      - name: "康定-理塘"
        km: 280
        surface: "paved"
        altitude_range: [2500, 4300]
        difficulty: "intermediate"
        note: "翻越折多山(4298m)、剪子湾山(4659m)、卡子拉山(4718m)。连续高海拔骑行，注意高反"
      - name: "理塘-巴塘"
        km: 200
        surface: "paved"
        altitude_range: [2600, 4700]
        difficulty: "intermediate"
        note: "海子山(4685m)，姊妹湖。理塘4000m+过夜需注意高反"
      - name: "巴塘-芒康"
        km: 105
        surface: "paved"
        altitude_range: [2600, 4200]
        difficulty: "intermediate"
        note: "过金沙江进入西藏，检查站"
      - name: "芒康-八宿"
        km: 360
        surface: "paved"
        altitude_range: [2700, 5100]
        difficulty: "advanced"
        note: "东达山(5130m，川藏线最高点)、怒江72拐。318全线最有挑战的一天"
      - name: "八宿-林芝"
        km: 450
        surface: "paved"
        altitude_range: [2800, 4500]
        difficulty: "intermediate"
        note: "然乌湖、波密。路况较好但里程长"
      - name: "林芝-拉萨"
        km: 400
        surface: "paved"
        altitude_range: [3000, 5000]
        difficulty: "intermediate"
        note: "林拉高速（摩托车可上）或G318老路。米拉山(5013m)"
