# 季节性骑行生理学知识库
# 温度、降水对人体骑行的影响，及对应的装备和风险

temperature:
  bands:
    - range: "below_-5°C"
      label: "极寒"
      risk:
        - "严重冻伤风险（暴露皮肤15分钟内冻伤）"
        - "路面暗冰，摩托车几乎无法安全操控"
        - "电池性能急剧下降，启动困难"
        - "机油粘度增大，发动机磨损加剧"
      gear:
        - "电加热骑行服 + 电加热手套"
        - "防风外层 + 多层中间保暖层"
        - "全盔 + 防雾贴片（必须）"
        - "加热手把 + 手把护罩"
      max_continuous_ride_minutes: 30
      recommendation: "不建议摩旅。若必须行驶，每30分钟必须停车取暖。"

    - range: "-5_to_5°C"
      label: "寒冷"
      risk:
        - "手指僵硬影响刹车和油门操控"
        - "失温风险（尤其伴随大风或降雨时）"
        - "路面可能结冰，桥梁和隧道口尤其危险"
        - "轮胎抓地力下降，热胎时间更长"
      gear:
        - "冬季骑行服 + 防风防水外层"
        - "冬季骑行手套 + 手把护罩或加热手把"
        - "保暖内衣 + 抓绒中间层"
        - "全盔 + Pinlock防雾"
        - "电加热装备（可选但强烈推荐）"
      max_continuous_ride_minutes: 90
      recommendation: "经验骑手可行，新手不推荐。注意桥梁暗冰。"

    - range: "5_to_15°C"
      label: "凉"
      risk:
        - "长时间骑行体感温度低于实际气温"
        - "小雨+凉风组合极易失温"
        - "肌肉僵硬增加疲劳和反应延迟"
      gear:
        - "三季骑行服（带可拆卸保暖层）"
        - "防水外层随身带"
        - "中厚度骑行手套"
        - "骑行裤 + 护膝（关节保暖重要）"
      max_continuous_ride_minutes: 120
      recommendation: "可骑行但需充分准备保暖和防水装备。"

    - range: "15_to_25°C"
      label: "舒适"
      risk: []
      gear: "标准骑行服，网眼或通风款均可"
      note: "理想骑行温度区间，日行里程可按上限规划"

    - range: "25_to_35°C"
      label: "炎热"
      risk:
        - "脱水（每小时不显性出汗可达500-1000ml）"
        - "中暑、热衰竭"
        - "沥青路面软化，轮胎抓地力下降"
        - "注意力下降、反应变慢"
        - "戴全盔时头部过热"
      gear:
        - "网眼骑行服（最大化通风）"
        - "骑行背心或水冷背心"
        - "夏季骑行手套"
        - "揭面盔或越野盔（增加通风）"
      hydration_ml_per_hour: 500-1000
      max_continuous_ride_minutes: 120
      recommendation: "避开12:00-15:00最热时段。强制每1-2小时补水+休息。"

    - range: "above_35°C"
      label: "酷热"
      risk:
        - "中暑高发，热射病可致命"
        - "沥青严重软化，重型摩托车可能压出车辙"
        - "发动机过热风险增加"
        - "佩戴护具意愿下降，安全隐患增加"
      gear: "同上 + 必须携带充足饮水"
      hydration_ml_per_hour: 1000+
      max_continuous_ride_minutes: 60
      rule: "12:00-16:00 必须停止骑行"
      recommendation: "不建议长途摩旅。若必须骑行，黎明出发、午前收车。"

precipitation:
  types:
    light_rain:
      label: "小雨"
      fatigue_multiplier: 1.3
      risk:
        - "路面摩擦系数下降约20-30%"
        - "白线、井盖、钢桥面极度湿滑"
      gear: "分体式雨衣 + 防水靴"
      note: "刚下雨时路面最滑（油污浮起），前30分钟最危险"

    moderate_rain:
      label: "中雨"
      fatigue_multiplier: 1.6
      risk:
        - "能见度下降，其他车辆更难发现摩托车"
        - "制动距离增加50%以上"
        - "积水路段有打水漂风险"
      gear: "同上 + 防水背包罩 + 电子设备防水"
      recommendation: "减速行驶，避免急刹和急转弯"

    heavy_rain:
      label: "大雨/暴雨"
      fatigue_multiplier: 1.8
      risk:
        - "山区有塌方和泥石流风险"
        - "国道低洼路段可能积水断路"
        - "能见度极低，被追尾风险显著增加"
        - "头盔镜片起雾+外部水流，视野严重受限"
      rule: "严重时应停车等待，不要硬闯"
      recommendation: "非必要不骑行。如在途中遇暴雨，找安全地点停车等待。"

    continuous_rain:
      label: "连续多日降雨"
      risk:
        - "疲劳累积效应：每天湿身着骑行，三天后体力和心理接近崩溃"
        - "路面持续湿滑，非铺装路段变成泥潭"
        - "装备晾不干，保暖层失效"
        - "意志力消耗极大"
      note: "连续3天以上降雨需安排休整日，这不是软弱而是安全需要"

wind:
  levels:
    light:
      speed_kmh: "0-20"
      effect: "无显著影响"
    moderate:
      speed_kmh: "20-40"
      effect: "侧风可感知，需主动对抗，高速路段（>80km/h）影响明显"
    strong:
      speed_kmh: "40-60"
      effect: "侧风有推倒风险，桥梁和山口尤其危险。降低车速，身体重心向风侧倾斜"
    dangerous:
      speed_kmh: "60+"
      effect: "摩托车难以维持车道，极不安全。立即停车等待风力减弱"
      note: "高原山口和峡谷地带常有突发强风"